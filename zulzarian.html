<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zulzarian Bloodline</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
    max-width:1000px;
    margin:auto;
}

.header{
    background:linear-gradient(135deg,#6b4f1d,#2b2115);
    padding:40px 20px;
    text-align:center;
    border-radius:15px;
    border:2px solid gold;
    margin-bottom:25px;
}

.header h1{
    color:gold;
    font-size:36px;
    margin-bottom:10px;
}

.header p{
    color:#f1f5f9;
    line-height:1.6;
}

.card{
    background:#1e293b;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    border-left:5px solid gold;
    box-shadow:0 3px 10px rgba(0,0,0,0.25);
}

.card h2{
    color:gold;
    margin-bottom:15px;
    border-bottom:1px solid rgba(255,215,0,.3);
    padding-bottom:8px;
}

.card h3{
    color:#f8d66d;
    margin-top:15px;
    margin-bottom:10px;
}

.card p{
    color:#cbd5e1;
    line-height:1.8;
    margin-bottom:12px;
}

.card ul{
    padding-left:20px;
    margin-bottom:15px;
}

.card li{
    margin-bottom:8px;
    color:#e2e8f0;
    line-height:1.6;
}

.card strong{
    color:#f8d66d;
}

.back-btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    background:gold;
    color:black;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    background:#f8d66d;
}

@media(max-width:768px){

    body{
        padding:15px;
    }

    .header h1{
        font-size:28px;
    }

    .card{
        padding:15px;
    }

}
</style>

</head>
<body>
